<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>롤링페이퍼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f6;--surface:#fff;--border:rgba(0,0,0,.1);--border-md:rgba(0,0,0,.18);
  --text:#1a1a1a;--muted:#6b6b6b;
  --r-md:8px;--r-lg:14px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);color:var(--text);min-height:100vh;padding:24px 16px 80px;
  background-color:#d2b48c;
  background-image:radial-gradient(#bc9a7c 10%,transparent 11%),radial-gradient(#bc9a7c 10%,transparent 11%);
  background-size:10px 10px;background-position:0 0,5px 5px}
.wrap{max-width:900px;margin:0 auto}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;
  background:rgba(255,255,255,.75);padding:15px;border-radius:var(--r-lg);backdrop-filter:blur(5px)}
.title-wrap h1{font-size:22px;font-weight:600}
.title-wrap p{font-size:13px;color:var(--muted);margin-top:3px}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-family:var(--font);
  padding:7px 14px;border-radius:var(--r-md);border:1px solid var(--border-md);
  background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.btn-p{background:var(--text);color:#fff;border-color:var(--text)}
.btn-p:hover{opacity:.85;background:var(--text)}
.compose{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:20px;margin-bottom:28px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.row1{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.name-in{flex:1;min-width:130px;font-size:14px;font-family:var(--font);padding:8px 12px;
  border-radius:var(--r-md);border:1px solid var(--border-md);background:var(--bg);color:var(--text);outline:none}
.clabel{font-size:12px;color:var(--muted);white-space:nowrap}
.cdots{display:flex;gap:7px}
.cdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;
  transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.cdot.on{transform:scale(1.2)}
.tabs{display:flex;overflow:hidden;border:1px solid var(--border-md);border-radius:var(--r-md);width:fit-content;margin-bottom:14px}
.tab{padding:7px 18px;font-size:13px;font-family:var(--font);background:transparent;border:none;color:var(--muted);cursor:pointer}
.tab.on{background:var(--text);color:#fff}
textarea{width:min(440px,100%);height:440px;resize:none;font-size:22px;font-family:var(--font);
  line-height:1.6;padding:16px;border:1px solid var(--border-md);border-radius:var(--r-md);
  background:#FFFD82;color:#333;outline:none;display:block}
#cvs{display:block;width:min(440px,100%);height:440px;border:1px solid var(--border-md);
  border-radius:var(--r-md);cursor:crosshair;touch-action:none;background:#FFFD82}
.cbtns{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}
.penrow{display:flex;align-items:center;gap:8px;flex:1;min-width:160px}
.penrow label{font-size:12px;color:var(--muted);white-space:nowrap}
.penrow input[type=range]{flex:1}
.subrow{display:flex;justify-content:flex-end;margin-top:16px}
.board{display:flex;flex-wrap:wrap;gap:50px 30px;padding:50px 10px;align-items:flex-start}
.card{width:220px;height:280px;flex-shrink:0;flex-grow:0;
  display:flex;flex-direction:column;
  position:relative;border-radius:4px;padding:22px 18px 16px;
  box-shadow:3px 5px 12px rgba(0,0,0,.25);overflow:hidden}
.pin{position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;background:#E53935;border-radius:50%;
  box-shadow:inset -2px -2px 4px rgba(0,0,0,.3),2px 2px 4px rgba(0,0,0,.4);z-index:2}
.pin::after{content:'';position:absolute;top:10px;left:7px;width:2px;height:12px;
  background:#777;transform:rotate(30deg)}
.cname{font-size:12px;font-weight:700;margin-bottom:10px;opacity:.75;
  border-bottom:1px solid rgba(0,0,0,.1);padding-bottom:4px}
.ctext{font-size:14px;line-height:1.65;word-break:break-word;flex:1}
.cimg{width:100%;border-radius:4px;display:block}
.ctime{font-size:11px;opacity:.45;text-align:right;margin-top:12px}
.cdel{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.1);border:none;
  border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transition:opacity .15s;font-size:12px;z-index:3}
.card:hover .cdel{opacity:1}
.empty{text-align:center;padding:60px 20px;color:#fff;font-size:14px;font-weight:500}
.empty i{font-size:40px;display:block;margin-bottom:10px}
.badge{display:inline-block;background:rgba(0,0,0,.07);border-radius:20px;
  padding:2px 10px;font-size:12px;color:var(--muted);margin-left:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 24px;border-radius:var(--r-md);
  font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
  justify-content:center;z-index:9999;flex-direction:column;gap:12px}
.loading p{font-size:14px;color:var(--muted)}
.spin{width:28px;height:28px;border:2.5px solid var(--border-md);border-top-color:var(--text);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;
  align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r-lg);padding:24px;width:min(360px,90vw);
  border:1px solid var(--border-md)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.modal label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px}
.modal input{width:100%;font-size:14px;font-family:var(--font);padding:8px 12px;
  border-radius:var(--r-md);border:1px solid var(--border-md);
  background:var(--bg);color:var(--text);outline:none;margin-bottom:16px}
.modal-btns{display:flex;justify-content:flex-end;gap:8px}
@media print{
  body{background:#fff;padding:0}
  .compose,.top-bar,.toast,.loading{display:none!important}
  .cdel{display:none!important}
  @page{size:A4 landscape;margin:1.2cm}
}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spin"></div><p>데이터 불러오는 중...</p></div>
<div class="wrap">
  <div class="top-bar">
    <div class="title-wrap">
      <h1 id="ptitle">롤링페이퍼 <span class="badge" id="badge">0개</span></h1>
      <p id="psub">따뜻한 메시지를 카드에 남겨보세요</p>
    </div>
    <div class="top-actions">
      <button class="btn" onclick="openSet()"><i class="ti ti-settings"></i> 설정</button>
      <button class="btn" onclick="printBoard()"><i class="ti ti-printer"></i> 출력</button>
      <button class="btn" onclick="doClear()"><i class="ti ti-trash"></i> 전체 삭제</button>
    </div>
  </div>
  <div class="compose">
    <div class="row1">
      <input class="name-in" id="nin" placeholder="이름 또는 닉네임" maxlength="20">
      <span class="clabel">포스트잇 색</span>
      <div class="cdots" id="cdots"></div>
    </div>
    <div class="tabs">
      <button class="tab on" id="ttxt" onclick="setMode('text')">자판 입력</button>
      <button class="tab" id="tdraw" onclick="setMode('draw')">손글씨</button>
    </div>
    <div id="mtext">
      <textarea id="ta" placeholder="따뜻한 메시지를 남겨보세요..." maxlength="150" oninput="updCount()"></textarea>
      <div style="text-align:right;font-size:12px;color:var(--muted);margin-top:4px"><span id="tcount">0</span>/150</div>
    </div>
    <div id="mdraw" style="display:none">
      <canvas id="cvs" width="440" height="440"></canvas>
      <div class="cbtns">
        <button class="btn" id="btn-pen" onclick="setPenMode('pen')"><i class="ti ti-pencil"></i> 펜</button>
        <button class="btn" id="btn-eraser" onclick="setPenMode('eraser')">⭕ 지우개</button>
        <button class="btn" onclick="clearCvs()"><i class="ti ti-trash"></i> 전체 지우기</button>
        <div class="penrow">
          <label>굵기</label>
          <input type="range" id="psize" min="1" max="14" value="3" oninput="updPen()">
          <div id="pdot"></div>
        </div>
      </div>
    </div>
    <div class="subrow">
      <button class="btn btn-p" onclick="doSubmit()"><i class="ti ti-send"></i> 보드에 꽂기</button>
    </div>
  </div>
  <div class="board" id="board"></div>
  <div class="empty" id="empty" style="display:none">
    <i class="ti ti-pin"></i><p>아직 포스트잇이 없어요. 첫 번째 메시지를 남겨보세요!</p>
  </div>
</div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>페이지 설정</h2>
    <label>수신자 이름</label>
    <input id="s-recv" placeholder="예: 홍길동 선생님" maxlength="30">
    <label>부제목</label>
    <input id="s-sub" placeholder="예: 3학년 7반 롤링페이퍼" maxlength="50">
    <div class="modal-btns">
      <button class="btn" onclick="closeSet()">취소</button>
      <button class="btn btn-p" onclick="saveSet()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Firebase SDK를 일반 스크립트로 로드 (module 방식 제거) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const COLORS=[
  {bg:'#FFFD82',text:'#333'},{bg:'#FFD1DC',text:'#333'},
  {bg:'#ADD8E6',text:'#333'},{bg:'#90EE90',text:'#333'},
  {bg:'#E0FFFF',text:'#333'},{bg:'#E6E6FA',text:'#333'},
];
const SK='rp_settings_v3';
let ci=0,mode='text',drawing=false,lx=0,ly=0,ps=3,ctx=null,penMode='pen';
let db=null,cardsRef=null;

// Firebase 초기화
const cfg={
  apiKey:"AIzaSyBsQFx47FHyKEXLQR0HojXXMFS4OmDbJ7c",
  authDomain:"rolling-paper-75a8e.firebaseapp.com",
  databaseURL:"https://rolling-paper-75a8e-default-rtdb.firebaseio.com",
  projectId:"rolling-paper-75a8e",
  storageBucket:"rolling-paper-75a8e.firebasestorage.app",
  messagingSenderId:"779877286803",
  appId:"1:779877286803:web:bce73ebbcd663d1e219e66"
};
firebase.initializeApp(cfg);
db=firebase.database();
cardsRef=db.ref('cards');

// 로딩 타임아웃
const loadT=setTimeout(()=>{
  document.getElementById('loading').style.display='none';
  document.getElementById('empty').style.display='';
},5000);

// Firebase에서 설정 실시간 불러오기
db.ref('settings').on('value',(snap)=>{
  if(snap.exists()){
    const s=snap.val();
    localStorage.setItem(SK,JSON.stringify(s));
    applySt(s);
  }
});

// 실시간 데이터 수신
cardsRef.on('value',(snap)=>{
  clearTimeout(loadT);
  const items=[];
  snap.forEach(function(c){items.push({id:c.key,color:c.val().color||{bg:'#FFFD82',text:'#333'},name:c.val().name,text:c.val().text,dataURL:c.val().dataURL,type:c.val().type,time:c.val().time});});
  items.reverse();
  renderCards(items);
  document.getElementById('loading').style.display='none';
});

// 색상 버튼
(function(){
  const row=document.getElementById('cdots');
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='cdot'+(i===0?' on':'');
    d.style.background=c.bg;
    d.style.borderColor=i===0?'#333':'transparent';
    d.onclick=()=>{
      ci=i;
      document.querySelectorAll('.cdot').forEach((el,j)=>{
        el.classList.toggle('on',j===i);
        el.style.borderColor=j===i?'#333':'transparent';
      });
      if(ctx){ctx.strokeStyle=COLORS[i].text;document.getElementById('cvs').style.background=COLORS[i].bg;}
      document.getElementById('ta').style.background=COLORS[i].bg;
      document.getElementById('ta').style.color=COLORS[i].text;
      updDot();
    };
    row.appendChild(d);
  });
})();

// 캔버스
function initCvs(){
  const c=document.getElementById('cvs');
  // 캔버스 고정 크기 (포스트잇 2배)
  c.width=440;c.height=440;
  ctx=c.getContext('2d');
  resetCvs();
  const gp=e=>{
    const r=c.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return[(s.clientX-r.left)*(c.width/r.width),(s.clientY-r.top)*(c.height/r.height)];
  };
  c.addEventListener('mousedown',e=>{drawing=true;[lx,ly]=gp(e);});
  c.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;[lx,ly]=gp(e);},{passive:false});
  c.addEventListener('mousemove',e=>{if(!drawing)return;const[x,y]=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();[lx,ly]=[x,y];});
  c.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const[x,y]=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();[lx,ly]=[x,y];},{passive:false});
  c.addEventListener('mouseup',()=>drawing=false);
  c.addEventListener('touchend',()=>drawing=false);
  c.addEventListener('mouseleave',()=>drawing=false);
}
function resetCvs(){
  const c=document.getElementById('cvs');
  c.style.background=COLORS[ci].bg;
  document.getElementById('ta').style.background=COLORS[ci].bg;
  document.getElementById('ta').style.color=COLORS[ci].text;
  ctx.clearRect(0,0,c.width,c.height);
  ctx.globalCompositeOperation='source-over';
  ctx.strokeStyle=COLORS[ci].text;ctx.lineWidth=ps;ctx.lineCap='round';ctx.lineJoin='round';
  penMode='pen';
  if(document.getElementById('btn-pen')){
    document.getElementById('btn-pen').classList.add('btn-p');
    document.getElementById('btn-eraser').classList.remove('btn-p');
  }
  updDot();
}
function setPenMode(m){
  penMode=m;
  document.getElementById('btn-pen').classList.toggle('btn-p', m==='pen');
  document.getElementById('btn-eraser').classList.toggle('btn-p', m==='eraser');
  if(ctx){
    if(m==='eraser'){
      ctx.globalCompositeOperation='destination-out';
      ctx.lineWidth=ps*5;
    } else {
      ctx.globalCompositeOperation='source-over';
      ctx.strokeStyle=COLORS[ci].text;
      ctx.lineWidth=ps;
    }
  }
  updDot();
}
function clearCvs(){resetCvs();}
function updPen(){
  ps=parseInt(document.getElementById('psize').value);
  if(ctx) ctx.lineWidth=(penMode==='eraser')?ps*5:ps;
  updDot();
}
function updDot(){
  if(penMode==='eraser'){
    const r=Math.max(4,ps*2);
    document.getElementById('pdot').innerHTML=`<svg width="40" height="40"><circle cx="20" cy="20" r="${r}" fill="none" stroke="#999" stroke-width="2"/></svg>`;
  } else {
    const r=Math.max(3,ps/2+1);
    document.getElementById('pdot').innerHTML=`<svg width="28" height="20"><circle cx="14" cy="10" r="${r}" fill="${COLORS[ci].text}"/></svg>`;
  }
}

// 모드
function setMode(m){
  mode=m;
  document.getElementById('ttxt').classList.toggle('on',m==='text');
  document.getElementById('tdraw').classList.toggle('on',m==='draw');
  document.getElementById('mtext').style.display=m==='text'?'':'none';
  document.getElementById('mdraw').style.display=m==='draw'?'':'none';
  if(m==='draw')resetCvs();
}

// 렌더링
function renderCards(items){
  const board=document.getElementById('board');
  const empty=document.getElementById('empty');
  document.getElementById('badge').textContent=items.length+'개';
  board.innerHTML='';
  if(items.length===0){empty.style.display='';return;}
  empty.style.display='none';
  items.forEach((card,i)=>{
    const rot=(Math.sin(i*12345.67)*3).toFixed(1);
    const el=document.createElement('div');
    el.className='card';
    el.style.cssText=`background:${card.color.bg};color:${card.color.text};transform:rotate(${rot}deg);width:220px;min-height:220px;flex-shrink:0;flex-grow:0;display:flex;flex-direction:column;position:relative;border-radius:4px;padding:22px 18px 16px;box-shadow:3px 5px 12px rgba(0,0,0,.25);`;
    const inner=card.type==='text'
      ?`<div class="ctext" style="font-size:15px;line-height:1.6;">${esc(card.text).replace(/\n/g,'<br>')}</div>`
      :`<img class="cimg" src="${card.dataURL}" alt="손글씨" style="transform:scale(1.15);transform-origin:top left;width:87%;">`;
    el.innerHTML=`
      <div class="pin"></div>
      <button class="cdel" onclick="delCard('${card.id}')" style="color:${card.color.text}"><i class="ti ti-x"></i></button>
      <div class="cname">${esc(card.name)}</div>
      ${inner}
      <div class="ctime">${card.time}</div>`;
    board.appendChild(el);
  });
}

// 제출
function doSubmit(){
  const name=document.getElementById('nin').value.trim()||'익명';
  const c=COLORS[ci];
  if(mode==='text'){
    const t=document.getElementById('ta').value.trim();
    if(!t){toast('메시지를 입력해주세요');return;}
    cardsRef.push({type:'text',name,text:t,color:c,time:now()})
      .then(()=>toast('보드에 꽂혔어요!'))
      .catch(()=>toast('저장 실패. 다시 시도해주세요.'));
    document.getElementById('ta').value='';
  } else {
    const cvs=document.getElementById('cvs');
    const f=document.createElement('canvas');
    f.width=cvs.width;f.height=cvs.height;
    const fc=f.getContext('2d');
    fc.fillStyle=c.bg;fc.fillRect(0,0,f.width,f.height);fc.drawImage(cvs,0,0);
    cardsRef.push({type:'draw',name,dataURL:f.toDataURL('image/png'),color:c,time:now()})
      .then(()=>toast('보드에 꽂혔어요!'))
      .catch(()=>toast('저장 실패. 다시 시도해주세요.'));
    resetCvs();
  }
}

function delCard(id){
  if(!checkPw()){alert('비밀번호가 틀렸어요');return;}
  if(!confirm('이 카드를 삭제할까요?'))return;
  db.ref('cards/'+id).remove()
    .then(()=>toast('삭제됐어요'))
    .catch(()=>toast('삭제 실패'));
}
function doClear(){
  if(!checkPw()){alert('비밀번호가 틀렸어요');return;}
  if(!confirm('모든 카드를 삭제할까요?'))return;
  cardsRef.remove()
    .then(()=>toast('전체 삭제됐어요'))
    .catch(()=>toast('삭제 실패'));
}

// 설정
function checkPw(){return prompt('관리자 비밀번호를 입력하세요')==='361377';}
function openSet(){
  if(!checkPw()){alert('비밀번호가 틀렸어요');return;}
  const s=getSt();
  document.getElementById('s-recv').value=s.recv||'';
  document.getElementById('s-sub').value=s.sub||'';
  document.getElementById('modal').classList.add('open');
}
function closeSet(){document.getElementById('modal').classList.remove('open');}
function saveSet(){
  const recv=document.getElementById('s-recv').value.trim();
  const sub=document.getElementById('s-sub').value.trim();
  localStorage.setItem(SK,JSON.stringify({recv,sub}));
  // Firebase에도 설정 저장
  if(db) db.ref('settings').set({recv,sub});
  applySt({recv,sub});closeSet();toast('설정 저장됐어요');
}
function getSt(){try{return JSON.parse(localStorage.getItem(SK)||'{}');}catch(e){return{};}}
function applySt({recv,sub}){
  const cnt=document.getElementById('badge')?document.getElementById('badge').textContent:'0개';
  document.getElementById('ptitle').innerHTML=(recv?`${recv}에게 `:'롤링페이퍼 ')+`<span class="badge" id="badge">${cnt}</span>`;
  document.getElementById('psub').textContent=sub||'따뜻한 메시지를 카드에 남겨보세요';
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeSet();});

// 출력
function printBoard(){
  if(!checkPw()){alert('비밀번호가 틀렸어요');return;}
  const items=Array.from(document.querySelectorAll('.card'));

  border-radius:4px;padding:22px 16px 14px;box-shadow:3px 5px 12px rgba(0,0,0,.3)!important;break-inside:avoid;flex-shrink:0;flex-grow:0}

  background:#E53935;border-radius:50%;box-shadow:inset -2px -2px 4px rgba(0,0,0,.3),2px 2px 4px rgba(0,0,0,.4);z-index:2}
.cname{font-size:13px;font-weight:700;margin-bottom:10px;opacity:.75;border-bottom:1px solid rgba(0,0,0,.1);padding-bottom:4px}

<script>window.onload=()=>{setTimeout(()=>window.print(),500);}<\/script>

  win.document.close();
}

// 유틸
function now(){return new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}
